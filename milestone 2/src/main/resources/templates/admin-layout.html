<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:fragment="html(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title != null ? title + ' - Admin Panel' : 'Admin Panel'}">Admin Panel</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar" style="background-color: #2c3e50;">
        <div class="nav-container">
            <a href="/admin/dashboard" class="nav-logo">Smart Campus Admin</a>
            <ul class="nav-links">
                <li><a href="/admin/dashboard">Dashboard</a></li>
                <li><a href="/admin/statistics">Statistics</a></li>
                <li>
                    <form th:action="@{/logout}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-logout" style="background: transparent; border: 1px solid white; color: white;">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div th:replace="${content}"></div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Smart Campus Event Management System. Admin Panel.</p>
    </footer>
</body>
</html>
