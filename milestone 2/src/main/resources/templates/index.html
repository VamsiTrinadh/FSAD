<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(title='Upcoming Events', content=~{::div.content})}">
<body>
    <div class="content">
        <div class="hero-section">
            <h1>Campus Events & Workshops</h1>
            <p>Discover and register for the latest events happening on campus.</p>
        </div>
        
        <div class="events-grid">
            <div th:if="${#lists.isEmpty(events)}" class="no-data">
                <p>No upcoming events found.</p>
            </div>
            
            <div class="event-card" th:each="event : ${events}">
                <div class="event-card-header">
                    <span class="event-type" th:text="${event.eventType}">Workshop</span>
                    <span class="event-department" th:text="${event.department}">Computer Science</span>
                </div>
                <h3 class="event-title" th:text="${event.title}">Intro to Spring Boot</h3>
                <p class="event-date">
                    <i class="icon-calendar"></i>
                    <span th:text="${#temporals.format(event.eventDate, 'MMM dd, yyyy')}">Oct 25, 2026</span>
                </p>
                <p class="event-description" th:text="${#strings.abbreviate(event.description, 100)}">Learn the basics...</p>
                
                <div class="event-card-footer">
                    <span class="spots-left">
                        <span th:text="${event.maxCapacity - event.registrations.size()}"></span> spots left
                    </span>
                    <a th:href="@{/events/{id}(id=${event.id})}" class="btn btn-primary">View Details</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
