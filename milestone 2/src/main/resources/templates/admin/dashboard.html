<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin-layout :: html(title='Admin Dashboard', content=~{::div.content})}">
<body>
    <div class="content container">
        <div class="dashboard-header">
            <h2>Event Management Dashboard</h2>
            <a href="/admin/event/new" class="btn btn-primary">+ Add New Event</a>
        </div>

        <div class="filter-section card">
            <form th:action="@{/admin/dashboard}" method="get" class="filter-form">
                <div class="form-group row">
                    <div class="col">
                        <label>Date</label>
                        <input type="date" name="date" class="form-control" th:value="${param.date}">
                    </div>
                    <div class="col">
                        <label>Department</label>
                        <input type="text" name="department" class="form-control" th:value="${param.department}" placeholder="e.g. Computer Science">
                    </div>
                    <div class="col">
                        <label>Event Type</label>
                        <select name="eventType" class="form-control">
                            <option value="">All Types</option>
                            <option value="Workshop" th:selected="${param.eventType != null and param.eventType[0] == 'Workshop'}">Workshop</option>
                            <option value="Seminar" th:selected="${param.eventType != null and param.eventType[0] == 'Seminar'}">Seminar</option>
                            <option value="Conference" th:selected="${param.eventType != null and param.eventType[0] == 'Conference'}">Conference</option>
                            <option value="Guest Lecture" th:selected="${param.eventType != null and param.eventType[0] == 'Guest Lecture'}">Guest Lecture</option>
                        </select>
                    </div>
                    <div class="col flex-bottom">
                        <button type="submit" class="btn btn-secondary">Filter</button>
                        <a href="/admin/dashboard" class="btn btn-outline">Clear</a>
                    </div>
                </div>
            </form>
        </div>

        <div class="table-responsive card">
            <table class="table">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Date</th>
                        <th>Type</th>
                        <th>Department</th>
                        <th>Registrations</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(events)}">
                        <td colspan="6" style="text-align: center;">No events found.</td>
                    </tr>
                    <tr th:each="event : ${events}">
                        <td th:text="${event.title}">Title</td>
                        <td th:text="${#temporals.format(event.eventDate, 'MMM dd, yyyy')}">Date</td>
                        <td><span class="badge badge-secondary" th:text="${event.eventType}">Type</span></td>
                        <td th:text="${event.department}">Dept</td>
                        <td>
                            <div style="margin-bottom: 5px; font-weight: bold;">
                                <span th:text="${event.registrations.size()}"></span> / <span th:text="${event.maxCapacity}"></span>
                            </div>
                            <details th:if="${!#lists.isEmpty(event.registrations)}">
                                <summary style="cursor: pointer; color: var(--primary-color); font-size: 0.85em; font-weight: 500;">View Students</summary>
                                <div style="margin-top: 8px; max-height: 150px; overflow-y: auto; background: #f8f9fa; border-radius: 4px; padding: 8px; border: 1px solid #dee2e6;">
                                    <div th:each="reg : ${event.registrations}" style="border-bottom: 1px solid #e9ecef; padding-bottom: 6px; margin-bottom: 6px;">
                                        <div style="font-weight: 600; font-size: 0.85em; color: #333;" th:text="${reg.studentName}">Student Name</div>
                                        <div style="font-size: 0.8em; color: #666;">ID: <span th:text="${reg.studentId}"></span></div>
                                        <div style="font-size: 0.8em; color: #666;" th:text="${reg.studentEmail}">email@example.com</div>
                                    </div>
                                </div>
                            </details>
                        </td>
                        <td class="action-buttons">
                            <a th:href="@{/events/{id}(id=${event.id})}" class="btn-sm btn-info" target="_blank">View</a>
                            <a th:href="@{/admin/event/edit/{id}(id=${event.id})}" class="btn-sm btn-warning">Edit</a>
                            <a th:href="@{/admin/event/delete/{id}(id=${event.id})}" class="btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this event?');">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
