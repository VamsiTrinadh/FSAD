<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(title='OTP Verification', content=~{::div.content})}">
<body>
    <div class="content container">
        <div class="auth-form-container">
            <h2 class="form-title">Verify Your Email</h2>
            <p style="text-align: center; margin-bottom: 20px; color: #6b7280;">
                We've sent a 6-digit OTP to your email address. Please enter it below to complete your registration.
            </p>
            
            <div th:if="${errorMessage}" class="alert alert-danger">
                <p th:text="${errorMessage}"></p>
            </div>
            
            <form th:action="@{/register/verify-otp}" method="post" class="auth-form">
                <div class="form-group">
                    <label for="otp">Enter OTP Code</label>
                    <input type="text" id="otp" name="otp" class="form-control" placeholder="123456" required pattern="\d{6}" maxlength="6">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Verify & Register</button>
            </form>
            
            <div style="text-align: center; margin-top: 20px;">
                <a th:href="@{/}" class="btn btn-secondary">Cancel Registration</a>
            </div>
        </div>
    </div>
</body>
</html>
