<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin-layout :: html(title='Registration Statistics', content=~{::div.content})}">
<body>
    <div class="content container">
        <div class="dashboard-header">
            <h2>Event Registration Statistics</h2>
            <a href="/admin/dashboard" class="btn btn-secondary">Back to Dashboard</a>
        </div>

        <div class="stats-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
            
            <div class="stat-card" th:each="event : ${events}" style="background: white; border-radius: 8px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eee;">
                <h3 th:text="${event.title}" style="margin-top: 0; color: #2c3e50; font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 10px;">Event Title</h3>
                
                <div class="stat-details" style="margin-top: 15px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <span style="color: #7f8c8d;">Total Capacity:</span>
                        <strong th:text="${event.maxCapacity}">100</strong>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <span style="color: #7f8c8d;">Registered:</span>
                        <strong th:text="${event.registrations.size()}" style="color: #3498db;">50</strong>
                    </div>
                    
                    <!-- Progress Bar -->
                    <div style="width: 100%; background-color: #ecf0f1; border-radius: 4px; height: 8px; margin-top: 15px; overflow: hidden;">
                        <div th:style="'height: 100%; border-radius: 4px; background-color: ' + (${(event.registrations.size() * 100.0) / event.maxCapacity} > 90 ? '#e74c3c' : (${(event.registrations.size() * 100.0) / event.maxCapacity} > 70 ? '#f1c40f' : '#2ecc71')) + '; width: ' + ${(event.registrations.size() * 100.0) / event.maxCapacity} + '%'"></div>
                    </div>
                    <div style="text-align: right; font-size: 0.8rem; color: #7f8c8d; margin-top: 5px;">
                        <span th:text="${#numbers.formatDecimal((event.registrations.size() * 100.0) / event.maxCapacity, 1, 1)} + '%'">50%</span> filled
                    </div>
                </div>
            </div>
            
            <div th:if="${#lists.isEmpty(events)}" class="no-data">
                <p>No events found to display statistics.</p>
            </div>
            
        </div>
    </div>
</body>
</html>
