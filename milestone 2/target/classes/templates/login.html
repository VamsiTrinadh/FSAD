<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(title='Admin Login', content=~{::div.content})}">
<body>
    <div class="content container">
        <div class="form-container" style="max-width: 400px; margin: 100px auto;">
            <h2 style="text-align: center; margin-bottom: 30px;">Admin Login</h2>
            
            <div th:if="${param.error}" class="alert alert-danger">
                Invalid username and password.
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                You have been logged out.
            </div>

            <form th:action="@{/login}" method="post" class="custom-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" style="width: 100%;">Sign In</button>
            </form>
        </div>
    </div>
</body>
</html>
